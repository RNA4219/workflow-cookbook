name: security-ci
# Phase 3: reusable security gate entrypoint

on: [pull_request, push]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-ci:
    uses: ./.github/workflows/reusable/security-ci.yml
    secrets: inherit
