name: test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TZ: UTC
  LANG: C.UTF-8
  UV_VERSION: "0.10.10"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Sync locked development environment
        run: uv sync --locked --extra dev
      - name: Ruff
        run: uv run --locked ruff check .

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Sync locked development environment
        run: uv sync --locked --extra dev
      - name: Mypy
        run: uv run --locked mypy .

  unit:
    name: unit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Sync locked development environment
        run: uv sync --locked --extra dev
      - name: Pytest with coverage
        run: >-
          uv run --locked pytest -q
          --cov=tools
          --cov=security_headers
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  python-312:
    name: Python 3.12 compatibility
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Sync locked development environment
        run: uv sync --locked --extra dev
      - name: Pytest
        run: uv run --locked pytest -q

  build:
    needs: [lint, typecheck, unit]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install "uv==${UV_VERSION}"
      - name: Build wheel and source distribution
        run: uv build
      - name: Smoke-test non-editable wheel CLIs
        run: python tools/ci/smoke_wheel.py dist/*.whl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
