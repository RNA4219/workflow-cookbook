name: markdown-quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Check front matter
        run: python tools/ci/check_front_matter.py --check
      - name: Check acceptance records
        run: python tools/ci/check_acceptance.py --check
      - name: Check Birdseye freshness
        run: python tools/ci/check_birdseye_freshness.py --check --max-verified-age-days 90
      - name: Check RUNBOOK slimming (RG-003)
        run: python tools/ci/check_runbook_slimming.py --check
      - name: Check completion trace (RG-004)
        run: python tools/ci/check_completion_trace.py --check
      - name: Check agent-tools-hub boundary (RG-005)
        run: python tools/ci/check_agent_tools_hub_boundary.py --check
      - name: Check task completion propagation (RG-006)
        run: python tools/ci/check_task_completion_propagation.py --check
      - name: Check Task/Acceptance bidirectional sync (RG-008)
        run: python tools/ci/check_task_acceptance_bidirectional.py
      - name: Check version consistency (RG-007 warning)
        continue-on-error: true
        run: python tools/ci/check_version_consistency.py --check
      - name: Check documentation review due dates (warning)
        continue-on-error: true
        run: python tools/ci/check_docs_review_due.py --check --max-days-overdue 30

  metrics-contract-smoke:
    name: metrics-contract-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Check metrics threshold contract sample
        run: >-
          python tools/ci/check_metrics_thresholds.py
          --check
          --metrics-json examples/qa-metrics.sample.json
      - name: Explain production evidence boundary
        run: >-
          echo "Production KPI evidence is evaluated only when a release or rehearsal
          supplies a real .ga/qa-metrics.json artifact."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: DavidAnson/markdownlint-cli2-action@1628d9b2c73e580b4cb9b6b34303457a72478c5e # v23
        with:
          globs: |
            **/*.md
      - name: Run Vale (warning)
        uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2
        continue-on-error: true
