name: markdown-quality
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check front matter
        run: python tools/ci/check_front_matter.py --check
      - name: Check acceptance records
        run: python tools/ci/check_acceptance.py --check
      - name: Check Birdseye freshness
        run: python tools/ci/check_birdseye_freshness.py --check
      - name: Check metrics thresholds sample
        run: python tools/ci/check_metrics_thresholds.py --check --metrics-json examples/qa-metrics.sample.json
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
      - name: Run Vale
        uses: errata-ai/vale-action@v2
        continue-on-error: true
