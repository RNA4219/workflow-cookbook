permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Reusable Python CI
# Phase 1-2: 派生リポで使う Python CI ベースライン

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.11'
      coverage-threshold:
        type: number
        default: 80

jobs:
  ci:
    name: Python CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - run: pip install -r requirements.txt
        if: ${{ hashFiles('requirements.txt') != '' }}
      - run: pip install -r requirements-dev.txt
        if: ${{ hashFiles('requirements-dev.txt') != '' }}
      - name: Install pytest coverage helpers
        run: pip install pytest pytest-cov
      - name: Ruff
        run: pipx run ruff check .
      - name: Pytest
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under="$COVERAGE_THRESHOLD" -q
