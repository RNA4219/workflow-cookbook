name: Docs Resolve PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system .

      - name: Run docs resolve
        id: resolve
        run: |
          # Extract task_id from PR body or branch name
          TASK_ID=$(echo "${{ github.head_ref }}" | grep -oP '\d{8}-\d{2}' || echo "")

          if [ -z "$TASK_ID" ]; then
            TASK_ID=$(echo "${{ github.event.pull_request.body }}" | grep -oP 'task_id:\s*\K[\d-]+' || echo "")
          fi

          if [ -n "$TASK_ID" ]; then
            echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT

            # Run docs resolve
            if [ -f "examples/workflow_plugins.cross_repo.sample.json" ]; then
              uv run python tools/context/workflow_docs.py \
                --plugin-config examples/workflow_plugins.cross_repo.sample.json \
                resolve --task-id "$TASK_ID" > docs_resolve_result.json 2>&1 || true
            else
              echo '{"required": [], "recommended": [], "errors": [], "warnings": ["Plugin config not found"]}' > docs_resolve_result.json
            fi
          else
            echo "task_id=" >> $GITHUB_OUTPUT
            echo '{"required": [], "recommended": [], "errors": [], "warnings": ["No task_id found in PR"]}' > docs_resolve_result.json
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let result = {required: [], recommended: [], errors: [], warnings: []};
            try {
              const content = fs.readFileSync('docs_resolve_result.json', 'utf8');
              result = JSON.parse(content);
            } catch (e) {
              result.warnings.push('Could not parse resolve result');
            }

            const taskId = '${{ steps.resolve.outputs.task_id }}';

            let body = '## 📚 Docs Resolve Result\n\n';

            if (taskId) {
              body += `**Task ID:** ${taskId}\n\n`;
            }

            if (result.required && result.required.length > 0) {
              body += '### Required Docs\n';
              for (const doc of result.required) {
                body += `- ${doc.id || doc}\n`;
              }
              body += '\n';
            }

            if (result.recommended && result.recommended.length > 0) {
              body += '### Recommended Docs\n';
              for (const doc of result.recommended) {
                body += `- ${doc.id || doc}\n`;
              }
              body += '\n';
            }

            if (result.errors && result.errors.length > 0) {
              body += '### ⚠️ Errors\n';
              for (const err of result.errors) {
                body += `- ${err}\n`;
              }
              body += '\n';
            }

            if (result.warnings && result.warnings.length > 0) {
              body += '### ⚡ Warnings\n';
              for (const warn of result.warnings) {
                body += `- ${warn}\n`;
              }
              body += '\n';
            }

            body += '---\n';
            body += '*Generated by docs-resolve-pr-gate workflow*';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## 📚 Docs Resolve Result')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }