name: Governance Gate

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.11'
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event.pull_request == null ||
        !contains(github.event.pull_request.labels.*.name, 'governance:skip'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
      - name: Setup Python
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ github.event_name == 'workflow_call' && inputs.python-version || '3.11' }}
      - name: Install governance dependencies
        if: steps.changes.outputs.code == 'true'
        run: python -m pip install --disable-pip-version-check .
      - name: Governance gate
        if: steps.changes.outputs.code == 'true'
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python -m tools.ci.governance_gate
      - name: Repository responsibility ownership
        if: steps.changes.outputs.code == 'true'
        run: python tools/ci/check_repo_responsibilities.py --check
      - name: Aggregate INT metrics
        if: steps.changes.outputs.code == 'true'
        run: python tools/ci/aggregate_int.py
      - name: Upload INT metrics
        if: steps.changes.outputs.code == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: int-metrics
          path: tools/ci/int-metrics.json
          if-no-files-found: error
      - name: Docs-only change warning
        if: steps.changes.outputs.code != 'true'
        run: echo '::warning::Docs-only changes detected. Governance gate checks skipped.'
