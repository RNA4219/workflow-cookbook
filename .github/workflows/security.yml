name: Security Gate
# Phase 3: GA / 本番運用向けのセキュリティゲーティング

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  allowlist_guard:
    name: Allowlist Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate network allowlist changes
        env:
          BASE_REF: ${{ github.base_ref != '' && format('origin/{0}', github.base_ref) || format('origin/{0}', github.event.repository.default_branch) }}
        run: python -m tools.security.allowlist_guard --base-ref "$BASE_REF"

  semgrep:
    name: Semgrep
    needs: allowlist_guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

  bandit:
    name: Bandit
    needs: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -q -r tools security_headers -s B101,B105,B106,B107,B108,B404
        # B101 (assert): excluded for test code; B105-108 (hardcoded passwords): review needed
        # B404 (import subprocess): use cases validated with inline #nosec B603,B607 at call sites

  gitleaks:
    name: Gitleaks
    needs: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dep_audit:
    name: Dependency Audit
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install audit tools
        run: pip install pip-audit safety
      - name: Audit fixed dependencies
        # Use requirements.txt for reproducible, environment-independent auditing
        # pip-audit checks requirements.txt for known vulnerabilities
        run: pip-audit -r requirements.txt
      - name: Safety scan for fixed dependencies
        # Safety scans requirements.txt for known vulnerabilities
        run: safety scan -r requirements.txt