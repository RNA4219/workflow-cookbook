name: Security Gate
# Phase 3: GA / 本番運用向けのセキュリティゲーティング

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  allowlist_guard:
    name: Allowlist Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Validate network allowlist changes
        env:
          BASE_REF: ${{ github.base_ref != '' && format('origin/{0}', github.base_ref) || format('origin/{0}', github.event.repository.default_branch) }}
        run: python -m tools.security.allowlist_guard --base-ref "$BASE_REF"

  semgrep:
    name: Semgrep
    needs: allowlist_guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/ci

  bandit:
    name: Bandit
    needs: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: pip install bandit==1.9.4
      - run: bandit -q -c pyproject.toml -r tools security_headers
        # B101 (assert): excluded for test code; B105-108 (hardcoded passwords): review needed
        # B404 (import subprocess), B603 (subprocess call): git commands validated at call sites
        # B310 (urlopen) NOT excluded - SSRF risks will be detected

  gitleaks:
    name: Gitleaks
    needs: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dep_audit:
    name: Dependency Audit & SBOM
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install audit tools
        run: pip install pip-audit==2.10.0
      - name: Audit fixed dependencies
        # Use requirements.txt for reproducible, environment-independent auditing
        run: pip-audit -r requirements.txt
      - name: Generate SBOM
        # Generate CycloneDX SBOM from requirements.txt for supply chain visibility
        run: python -m tools.security.generate_sbom --output .ga/sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sbom-cyclonedx
          path: .ga/sbom.json
          retention-days: 90
        # Safety scan requires interactive login; pip-audit is sufficient for CI