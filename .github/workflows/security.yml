name: Security Gate
# Phase 3: GA / 本番運用向けのセキュリティゲーティング

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  allowlist_guard:
    name: Allowlist Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate network allowlist changes
        env:
          BASE_REF: ${{ github.base_ref != '' && format('origin/{0}', github.base_ref) || format('origin/{0}', github.event.repository.default_branch) }}
        run: python -m tools.security.allowlist_guard --base-ref "$BASE_REF"

  semgrep:
    name: Semgrep
    needs: allowlist_guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

  bandit:
    name: Bandit
    needs: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -q -r tools security_headers -s B101,B105,B106,B107,B108,B310,B404,B603,B607

  gitleaks:
    name: Gitleaks
    needs: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: "--no-banner detect -v"

  dep_audit:
    name: Dependency Audit
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pip-audit safety
      - run: pip-audit
      - run: safety check --exit-code 1