name: Security Gate
# Phase 3: GA / 本番運用向けのセキュリティゲーティング

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate security posture
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/ci/check_security_posture.py --check --github-repo "${{ github.repository }}"
  security-ci:
    uses: ./.github/workflows/reusable/security-ci.yml
    needs: security-posture
    with:
      python-version: "3.11"
    secrets: inherit