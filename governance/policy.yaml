self_modification:
  forbidden_paths:
    - "/core/schema/**"
    - "/auth/**"
  require_human_approval:
    - "/governance/**"
    - "/billing/**"

canary:
  abort_rules:
    - name: http_5xx_spike
      metric: http_5xx_rate
      threshold: 0.8        # %
      window: "5m"
      action: rollback

ci:
  # Logical gate identifiers. The mapping to concrete GitHub workflow/job/check names
  # is documented in docs/ci-config.md and ci_phased_rollout_requirements.md.
  required_jobs:
    - governance-gate
    - security-ci
    - python-ci
    - docs-gate

  # Docs gate checker stages: observe -> warn -> enforce
  # See docs/ci-config.md for escalation criteria and rollback conditions.
  checker_stages:
    RG-002: enforce  # Birdseye freshness - now enforced after 90-day threshold
    RG-003: warn     # Runbook slimming - observe for 30 days, then warn
    RG-004: warn     # Completion trace - warning with optional --require-acceptance-for-done
    RG-005: warn     # Agent-tools-hub boundary - routing duplication detection
    RG-006: warn     # Task completion propagation - nudge for missing completion-record
    RG-007: warn     # Version consistency - new checker, observe first

slo:
  lead_time_p95_hours: 24
  mttr_p95_minutes: 30
  change_failure_rate_max: 0.20
